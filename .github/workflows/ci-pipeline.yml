name: CI/CD Wallet Pipeline

# El pipeline se ejecutará cada vez que haya un PR hacia 'develop' o 'main'
on:
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  # Trabajo 1: Compilar y Testear
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar Tests con Maven
        run: mvn clean test

  # Trabajo 2: Auto-Merge (Solo se ejecuta si el anterior pasa)
  auto-merge:
    name: Auto Merge PR
    needs: build-and-test # Depende estrictamente de que los tests pasen
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Hacer merge automáticamente
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Usa la CLI de GitHub para decirle al PR que haga merge automáticamente
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --auto --repo ${{ github.repository }}